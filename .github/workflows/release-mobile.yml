name: Release Mobile (iOS & macOS)

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  check-version:
    name: Check mobile version bump
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        run: bash apps/mobile/scripts/check-version-bump.sh

  build-ios:
    name: Build iOS IPA
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets and generate iOS project
        working-directory: apps/mobile
        run: |
          pnpm build
          pnpm exec cap add ios
          pnpm exec cap sync ios
          bash scripts/prepare-release-build.sh

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Apple signing certificate
        if: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' }}
        uses: apple-actions/import-codesign-certs@v3
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Install provisioning profile
        if: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 != '' }}
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/mobile.mobileprovision

      - name: Archive iOS app
        working-directory: apps/mobile
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SIGN_ARGS=()
          if [ -n "$APPLE_TEAM_ID" ] && [ -n "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" ]; then
            SIGN_ARGS+=(DEVELOPMENT_TEAM="$APPLE_TEAM_ID")
          else
            SIGN_ARGS+=(CODE_SIGNING_ALLOWED=NO)
          fi

          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination 'generic/platform=iOS' \
            "${SIGN_ARGS[@]}" \
            clean archive

      - name: Export IPA
        if: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' && secrets.APPLE_TEAM_ID != '' }}
        working-directory: apps/mobile
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist native/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/ios-export"

      - name: Package unsigned archive
        if: ${{ secrets.BUILD_CERTIFICATE_BASE64 == '' || secrets.APPLE_TEAM_ID == '' }}
        run: |
          cd "$RUNNER_TEMP"
          zip -r ios-archive.zip App.xcarchive
          echo "::warning::iOS signing secrets are not configured. Uploaded unsigned .xcarchive zip instead of an IPA."

      - name: Upload iOS IPA
        if: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' && secrets.APPLE_TEAM_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ needs.check-version.outputs.version }}
          path: ${{ runner.temp }}/ios-export/*.ipa
          if-no-files-found: error

      - name: Upload unsigned iOS archive
        if: ${{ secrets.BUILD_CERTIFICATE_BASE64 == '' || secrets.APPLE_TEAM_ID == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ needs.check-version.outputs.version }}
          path: ${{ runner.temp }}/ios-archive.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets and sync Electron
        working-directory: apps/mobile
        run: |
          pnpm build
          pnpm exec cap sync @capacitor-community/electron
          bash scripts/prepare-release-build.sh

      - name: Build macOS DMG
        working-directory: apps/mobile/electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          npm install
          npm run electron:make -- --mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ needs.check-version.outputs.version }}
          path: apps/mobile/electron/dist/*.dmg
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [check-version, build-ios, build-macos]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-${{ needs.check-version.outputs.version }}
          path: release/ios

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-${{ needs.check-version.outputs.version }}
          path: release/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v${{ needs.check-version.outputs.version }}
          name: Mobile v${{ needs.check-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/ios/*
            release/macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
